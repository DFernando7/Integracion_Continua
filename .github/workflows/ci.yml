name: CI Pipeline - Integracion Continua

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  checkout:
    name: "📥 Checkout"
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
      - name: Verificar archivos
        run: |
          echo "✅ Repositorio clonado correctamente"
          ls -la

  build:
    name: "🔨 Build"
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - uses: actions/checkout@v4
      - name: Construir imagen Docker
        run: |
          echo "🔨 Construyendo imagen Docker de la aplicación Flask..."
          docker build -t flask_app ./app
          echo "✅ Imagen construida exitosamente"

  test:
    name: "🧪 Test"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Instalar dependencias Python
        run: pip install flask==3.0.2 psycopg2-binary==2.9.9
      - name: Verificar sintaxis de la aplicación
        run: |
          echo "🧪 Verificando sintaxis del código fuente..."
          python -m py_compile app/app.py
          echo "✅ Sintaxis verificada correctamente"
      - name: Construir y verificar imagen
        run: |
          docker build -t flask_app ./app
          docker images | grep flask_app
          echo "✅ Imagen verificada correctamente"

  deploy:
    name: "🚀 Deploy"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Construir imagen
        run: docker build -t flask_app ./app
      - name: Verificar despliegue
        run: |
          echo "🚀 Desplegando contenedor de prueba..."
          docker run -d --name flask_test_ci -p 5001:5000 flask_app
          sleep 5
          docker ps | grep flask_test_ci
          docker stop flask_test_ci
          docker rm flask_test_ci
          echo "✅ Despliegue verificado exitosamente"
      - name: Pipeline completado
        run: echo "🎉 Pipeline GitHub Actions ejecutado con éxito"